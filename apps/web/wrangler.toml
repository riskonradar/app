name = "risk-on-radar"
main = ".open-next/worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
NEXT_PUBLIC_CLERK_SIGN_IN_URL = "/sign-in"
NEXT_PUBLIC_CLERK_SIGN_UP_URL = "/sign-up"
NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL = "/"
NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL = "/"

# Deployment-specific values are intentionally not committed.
# Set per environment before deploying, e.g.:
#   NEXT_PUBLIC_APP_URL           production origin (https://app.riskonradar.com)
#   NEXT_PUBLIC_SUPABASE_URL      Supabase project URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY Supabase publishable key
# via `wrangler deploy --var` / CI build env, and secrets
# (CLERK_SECRET_KEY, SUPABASE_SERVICE_ROLE_KEY, STRIPE_*) via `wrangler secret put`.
